<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <style>
        body { font-family: Arial, sans-serif; color: #333; line-height: 1.6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { background: #3a79c9; color: white; padding: 20px; text-align: center; font-size: 24px; }
        .content { padding: 20px; background: #f9f9f9; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #666; }

        .info p { margin: 8px 0; }
        table { width: 100%; border-collapse: collapse; margin: 15px 0; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #e9e9e9; }
        .total { font-size: 18px; font-weight: bold; text-align: right; margin-top: 20px; }
        .total span { color: #3a79c9; }
    </style>
    <title>PAYMENT RECEIPT</title>
</head>
<body>
<div class="container">
    <div class="header">PAYMENT RECEIPT</div>
    <div class="content">
        <div class="info">
            <p><strong>Order #:</strong> <span th:text="${order.id}">—</span></p>
            <p th:if="${order.createdBy != null}">
                <strong>Customer:</strong>
                <span th:text="${order.createdBy.lastName + ' ' + order.createdBy.firstName}"></span>
                (<span th:text="${order.createdBy.email}"></span>)
            </p>
            <p><strong>Date:</strong> <span th:text="${#temporals.format(now, 'yyyy-MM-dd HH:mm')}"></span></p>
        </div>

        <table>
            <thead>
            <tr><th>#</th><th>Product</th><th>Price</th><th>Discount</th></tr>
            </thead>
            <tbody>
            <tr th:each="item, iter : ${order.itemList}">
                <td th:text="${iter.index + 1}">1</td>
                <td th:text="${item.item?.title ?: 'Product'}">Product</td>
                <td th:text="${#numbers.formatDecimal(item.cost, 1, 2)}">0.00</td>
                <td>
                    <span th:if="${item.discountCost != null and item.discountCost > 0}"
                          th:text="${#numbers.formatDecimal(item.discountCost, 1, 2)}">0.00</span>
                    <span th:unless="${item.discountCost != null and item.discountCost > 0}">—</span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(order.itemList)}">
                <td colspan="4" style="text-align:center;">No items</td>
            </tr>
            </tbody>
        </table>

        <div class="total">
            TOTAL: <span th:text="${#numbers.formatDecimal(order.totalCost, 1, 2)} + ' ' + ${order.currency ?: 'RUB'}"></span>
            <br th:if="${order.discountCost != null and order.discountCost > 0}"/>
            <span th:if="${order.discountCost != null and order.discountCost > 0}"
                  style="font-size:14px; color:green;">Order discount: <span th:text="${#numbers.formatDecimal(order.discountCost, 1, 2)}"></span></span>
        </div>
    </div>
    <div class="footer">Thank you for your order!</div>
</div>
</body>
</html>
